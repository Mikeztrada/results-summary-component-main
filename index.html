<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="your-result">
        <h1 class="titulo">Your Result</h1>
        <h2 class="numero-grande"><span>76</span> of 100</h2>
        <h3>Great</h3>
        <p class="parrafo-result">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </section>

      <section class="your-summary">
        <h2>Summary</h2>
        <ul id="lista-summary"></ul>
        <button type="button" class="boton-continue">Continue</button>
      </section>
    </main>

    <!-- <footer class="attribution">
            Challenge by
                  <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
                        Coded by <a href="#">Your Name Here</a>.
                            </footer>-->

  </body>
  <script>
    const ejecutaFetch = async () => {
      try {
        const response = await fetch("./data.json");

        const data = await response.json();
        console.log(data);
        const listaContenedor = document.querySelector("#lista-summary");
        data.forEach((item) => {
          const li = document.createElement("li");
          li.classList.add(`${item.category.toLowerCase()}`);
          li.innerHTML = `
    <img src="${item.icon}" alt="">
    <span>${item.category}</span>
    <span><strong>${item.score}</strong> / 100</span>
  `;
          listaContenedor.appendChild(li);
        });
      } catch (error) {
        console.log(error);
      }
    };

    ejecutaFetch();
  </script>
</html>
